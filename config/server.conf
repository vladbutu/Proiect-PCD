// configuratie libconfig pentru Video Processing Server (T5)
// incarcata la pornire de server.c via libconfig (lib extern obligatoriu)

server = {
    // portul TCP pe care serverul asculta cereri de la clienti
    listen_port = 18081;

    // nr maxim de conexiuni simultane urmarite de poll()
    max_clients  = 64;

    // nr maxim de procese copil (workeri) care pot rula in paralel
    // fiecare task video (trim/filter/segment merge/mixaudio) e gestionat
    // de un worker fork()-at; limita asta previne supraincarcarea serverului
    max_workers  = 8;

    // pt operatia MERGE: serverul imparte concatenarea in atatea segmente,
    // fiecare procesat de propriul worker fork()-at, apoi uneste rezultatele
    // (vezi worker.c si video_ops.c)
    merge_parallelism = 4;
};

storage = {
    // directorul unde sunt stocate clipurile uploadate (subdirectoare per client)
    uploads_dir = "./data/uploads";

    // directorul unde sunt scrise outputurile procesate
    outputs_dir = "./data/outputs";

    // calea absoluta la binarul ffmpeg invocat prin execv() de workeri
    // NICIODATA nu folosim system() -- cert-env33-c interzice asta
    ffmpeg_binary = "/usr/bin/ffmpeg";
};

logging = {
    level    = "info";           // unul din: debug|info|warn|error
    log_file = "./vps_server.log";
};
